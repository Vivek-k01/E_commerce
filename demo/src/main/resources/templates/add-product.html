<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Add New Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #0d6efd; border: none; }
        .btn-primary:hover { background-color: #0b5ed7; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 form-container">
            <h2 class="text-center mb-4 fw-bold text-primary">Add New Product</h2>
            
            <form th:action="@{/admin/add}" th:object="${product}" method="POST" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Product Name</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Nike Running Shoes" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Price (₹)</label>
                    <input type="number" th:field="*{price}" class="form-control" placeholder="599" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Tell something about the product..."></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Product Image</label>
                    <input type="file" name="productImage" class="form-control" accept="image/*" required>
                    <div class="form-text">Select a professional photo for your product.</div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">Publish Product</button>
                    <!-- <a href="/" class="btn btn-light">Cancel</a> -->
                    <a href="/admin/dashboard?pass=admin123" class="btn btn-secondary w-100 mt-2">
    Cancel
</a>
                </div>
                
            </form>
        </div>
    </div>
</div>

</body>
</html>
