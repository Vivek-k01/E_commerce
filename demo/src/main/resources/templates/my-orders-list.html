<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Order History | Apni Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; padding-top: 50px; }
        .order-card { background: white; border-radius: 15px; border: none; margin-bottom: 20px; transition: 0.3s; }
        .order-card:hover { transform: scale(1.01); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .status-badge { font-size: 0.8rem; padding: 5px 15px; border-radius: 50px; background-color: #fff3cd; color: #856404; font-weight: bold; }
        .price-text { color: #f43397; font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container mb-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold">My Order History 📦</h2>
            <p class="text-muted">Showing orders for mobile: <strong th:text="${userMobile}">0000000000</strong></p>
            <a href="/" class="btn btn-outline-secondary btn-sm">← Continue Shopping</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div th:each="order : ${orders}" class="card order-card shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted small">Order ID: #<span th:text="${order.id}">101</span></span>
                        <span class="status-badge" th:text="${order.status}">Pending</span>
                    </div>
                    <div class="row align-items-center">
                        <div class="col-8">
                            <h6 class="fw-bold mb-1" th:text="${order.customerName}">Customer Name</h6>
                            <p class="text-muted small mb-0" th:text="${order.address}">Delivery Address</p>
                        </div>
                        <div class="col-4 text-end">
                            <span class="price-text">₹<span th:text="${order.totalBill}">0</span></span>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/11329/11329073.png" width="80" class="mb-3 opacity-25">
                    <h5 class="text-muted">Bhai, is number se koi order nahi mila!</h5>
                    <p class="small text-muted">Kya aapne sahi number daala hai?</p>
                    <a href="/my-orders-login" class="btn btn-primary mt-3">Try Another Number</a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
