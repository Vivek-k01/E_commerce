<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Checkout | Delivery Details</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5 card shadow border-0 p-4">
                <h3 class="fw-bold text-center mb-4">Delivery Address 📍</h3>
                <form th:action="@{/placeOrder}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" name="customerName" class="form-control" placeholder="Name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mobile Number</label>
                        <input type="number" name="mobileNumber" class="form-control" placeholder="10 digit number" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Complete Address</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="Address" required></textarea>
                    </div>
                    <div class="alert alert-info py-2">
                        <h5 class="mb-0 text-center">Total Bill: ₹<span th:text="${total}">0</span></h5>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 shadow-sm">
                        CONFIRM ORDER (Cash on Delivery)
                    </button>
                    <div class="text-center mt-3">
                        <a href="/cart" class="text-muted small text-decoration-none">← Back to Cart</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
