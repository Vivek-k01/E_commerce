<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 card p-4 shadow">
            <h2 class="text-center text-primary mb-4 fw-bold">Update Product</h2>
            
            <form th:action="@{'/admin/product/update/' + ${product.id}}" th:object="${product}" method="POST" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label class="form-label fw-semibold">Product Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Price (₹)</label>
                    <input type="number" th:field="*{price}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Product Image (Leave blank to keep old)</label>
                    <input type="file" name="productImage" class="form-control" accept="image/*">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning fw-bold">Update Now</button>
                    <!-- <a href="/admin/products" class="btn btn-secondary">Back to List</a> -->
                    <a href="/admin/dashboard?pass=admin123" class="btn btn-light w-100 mt-2">
    Cancel
</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
