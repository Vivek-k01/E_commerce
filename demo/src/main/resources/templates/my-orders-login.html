<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px;  width: 100%; max-width: 400px; text-align: center; }
        .btn-check-orders { background-color: #232f3e; color: white; font-weight: 600; border-radius: 10px; padding: 12px; transition: 0.3s; width: 100%; border: none; }
        .btn-check-orders:hover { background-color: #344454; transform: translateY(-2px); }
        .logo-text { color: #f43397; font-weight: 800; font-size: 24px; margin-bottom: 20px; display: block; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card shadow">
        <a href="/" class="logo-text text-uppercase">Apni Shop</a>
        <h4 class="fw-bold mb-3">Check Your Orders</h4>
        <p class="text-muted small mb-4">Apna wo mobile number daalein jis se aapne order kiya tha.</p>

        <form th:action="@{/view-my-orders}" method="GET">
            <div class="mb-4 text-start">
                <label class="form-label small fw-bold">Mobile Number</label>
                <input type="text" name="mobile" class="form-control form-control-lg" 
                       placeholder="e.g. 9876543210" required maxlength="10" pattern="\d{10}">
            </div>
            <button type="submit" class="btn btn-check-orders">View My History 📦</button>
        </form>

        <div class="mt-4">
            <a href="/" class="text-decoration-none small text-secondary">← Back to Shopping</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
