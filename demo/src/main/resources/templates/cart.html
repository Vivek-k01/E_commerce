<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>My Shopping Bag | Meesho Clone</title>
    <style>
        /* Navbar hamesha top par rahe aur content uske niche se nikle */
        .sticky-top {
            z-index: 1020;
        }
        .product-card:hover {
            border-color: #f43397; /* Meesho pink touch */
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Your_cart</a>
            <a href="/" class="btn btn-outline-light btn-sm">Continue Shopping</a>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4 fw-bold text-secondary">Your Shopping Cart 🛒</h2>
        
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm p-3 mb-3 border-0 product-card" th:each="item, iterStat : ${cart}">
                    <div class="d-flex align-items-center">
                        <img th:src="@{'/productImages/' + ${item.imageName}}" width="100" height="100" class="rounded me-3 shadow-sm" style="object-fit: cover;">
                        
                        <div class="flex-grow-1">
                            <h5 th:text="${item.name}" class="mb-1 fw-bold">Product Name</h5>
                            <p class="text-success fw-bold mb-2">₹<span th:text="${item.price}">0</span></p>
                            
                            <a th:href="@{'/cart/removeItem/' + ${iterStat.index}}" 
                               class="btn btn-sm btn-outline-danger border-0 p-0 fw-bold" 
                               style="text-decoration: none;">
                               <span class="me-1">🗑️</span> Remove Item
                            </a>
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(cart)}" class="text-center mt-5 p-5 bg-white rounded shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/512/11329/11329073.png" width="100" class="mb-3 opacity-50">
                    <h4 class="text-muted">Aapka cart khali hai! 🛍️</h4>
                    <p>Chalo, kuch badhiya dhoondte hain.</p>
                    <a href="/" class="btn btn-primary px-4">Abhi Shopping Karein</a>
                </div>
            </div>

            <div class="col-md-4" th:if="${!#lists.isEmpty(cart)}">
                <div class="card shadow border-0 p-4 sticky-top" style="top: 80px;">
                    <h4 class="fw-bold text-dark">Price Details</h4>
                    <hr>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Total Items:</span>
                        <span class="fw-bold text-dark" th:text="${cart.size()}">0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="h5 fw-bold">Total Bill:</span>
                        <span class="h5 fw-bold text-primary">₹<span th:text="${total}">0</span></span>
                    </div>
                    
                    <a href="/checkout" class="btn btn-success w-100 fw-bold py-3 shadow-sm text-center">
                        PROCEED TO CHECKOUT
                    </a>
                    
                    <div class="mt-3 text-center">
                        <small class="text-muted">Safe and Secure Payments. Easy returns.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
